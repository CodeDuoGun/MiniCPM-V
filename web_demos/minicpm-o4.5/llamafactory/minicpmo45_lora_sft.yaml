### This config targets a pinned LLaMA-Factory main commit with MiniCPM-o 4.5 support.
### model
model_name_or_path: openbmb/MiniCPM-o-4_5
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05

### dataset
dataset_dir: web_demos/minicpm-o4.5/llamafactory
dataset: tcm_o45_train
eval_dataset: tcm_o45_validation
template: minicpm_o
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### output
output_dir: outputs/tcm_minicpmo45_lora
logging_steps: 5
eval_steps: 50
save_steps: 50
plot_loss: true
overwrite_output_dir: false
save_total_limit: 3
report_to: tensorboard

### train
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
save_only_model: true

### eval
eval_strategy: steps
prediction_loss_only: true

